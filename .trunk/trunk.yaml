# This file controls the behavior of Trunk: https://docs.trunk.io/cli
#
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.21.0

# Trunk provides extensibility via plugins.
# (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.4.5
      uri: https://github.com/trunk-io/plugins

# Many linters and tools depend on runtimes - configure them here.
# (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@18.12.1
    - python@3.10.8

downloads:
  - name: typos
    downloads:
      - os:
          macos: apple-darwin
        cpu:
          x86_64: x86_64
          arm_64: aarch64
        url: https://github.com/crate-ci/typos/releases/download/v${version}/typos-v${version}-${cpu}-${os}.tar.gz
      - os:
          linux: unknown-linux-musl
        cpu:
          x86_64: x86_64
          arm_64: aarch64
        url: https://github.com/crate-ci/typos/releases/download/v${version}/typos-v${version}-${cpu}-${os}.tar.gz
      - os:
          windows: pc-windows-mscvc
        cpu:
          x86_64: x86_64
        url: https://github.com/crate-ci/typos/releases/download/v${version}/typos-v${version}-${cpu}-${os}.tar.gz

tools:
  definitions:
    - name: typos
      download: typos
      known_good_version: 1.36.2
      shims: [typos]

# This is the section where you manage your linters.
# (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    # Hadolint seems to have excessive memory use on Mac.
    # Disable until we can investigate further.
    - hadolint
  definitions:
    - name: bandit
      direct_configs: [bandit.yaml]
      commands:
        - name: lint
          run: bandit --exit-zero -c bandit.yaml --format json --output ${tmpfile} ${target}

    - name: typos
      files:
        - python
        - markdown
        - xml
        - shell
        - java
        - typescript
        - javascript
      tools: [typos]
      commands:
        - output: sarif
          success_codes: [0, 2]
          run: typos ${target} --format sarif --config ${workspace}/.trunk/configs/_typos.toml --no-unicode
          read_output_from: stdout

  ignore:
    - linters: [typos]
      paths:
        - .trunk/configs/_typos.toml
        - .gitignore

  enabled:
    - actionlint@1.6.27
    - bandit@1.7.8
    - black@24.3.0
    - checkov@3.2.55
    - git-diff-check
    - isort@5.13.2
    - markdownlint@0.39.0
    - osv-scanner@1.7.0
    - pre-commit-hooks@4.6.0:
        commands:
          - check-ast
          - check-case-conflict
          - check-docstring-first
          - check-json
          - check-merge-conflict
          - check-toml
          - check-yaml
          - debug-statements
          - detect-aws-credentials --allow-missing-credentials
          - end-of-file-fixer
          - trailing-whitespace
    - prettier@3.2.5
    - pyright@1.1.357
    - ruff@0.3.5
    - shellcheck@0.10.0
    - shfmt@3.6.0
    - taplo@0.8.1
    - terrascan@1.19.1
    - trivy@0.50.1
    - trufflehog@3.71.0
    - typos@1.36.2
    - yamllint@1.35.1

actions:
  disabled:
    - trunk-check-pre-push
    - trunk-announce
  enabled:
    - trunk-check-pre-commit
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
